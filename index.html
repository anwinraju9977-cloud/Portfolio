<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portfolio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
overflow:hidden;
color:#b3b3b3;
}

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:rgba(60,60,60,0.06);
border-radius:50%;
filter:blur(80px);
animation:floatGlow 20s infinite ease-in-out;
}

@keyframes floatGlow{
50%{
transform:translateY(-40px) scale(1.1);
}
}

.container{
text-align:center;
z-index:2;
padding:20px;
}

.logo{
font-size:50px;
font-weight:800;
color:#464444;
margin-bottom:20px;
}

h1{
font-size:38px;
line-height:1.3;
padding:0 20px;
margin-bottom:20px;
}

/* DESKTOP typing animation */
.typing{
display:inline-block;
overflow:hidden;
white-space:nowrap;
width:0;
border-right:3px solid #b3b3b3;

animation:
typing 4s steps(24,end) forwards,
blink .8s infinite;
}

@keyframes typing{
from{width:0;}
to{width:560px;}
}

@keyframes blink{
50%{
border-color:transparent;
}
}

p{
margin-top:25px;
font-size:18px;
color:#8f8f8f;
}

.btn{
display:inline-block;
margin-top:35px;
padding:15px 40px;
border:2px solid #777777;
border-radius:50px;
text-decoration:none;
color:#d0d0d0;
background:#050505;
transition:.4s;
}

.btn:hover{
background:#2d033d;
color:#ffffff;
border-color:#000000;
transform:scale(1.08);
}

.socials{
margin-top:35px;
display:flex;
justify-content:center;
gap:30px;
}

.socials img{
width:42px;
height:42px;
filter:grayscale(100%) brightness(0.7);
opacity:.85;
transition:transform .3s;
cursor:pointer;
}

.socials img:hover,
.socials img:active{
transform:translateY(-6px) scale(1.18);
animation:colorStay 5s forwards;
}

@keyframes colorStay{

0%{
filter:grayscale(100%) brightness(0.7);
}

10%{
filter:grayscale(0%) brightness(1.2);
}

90%{
filter:grayscale(0%) brightness(1.2);
}

100%{
filter:grayscale(100%) brightness(0.7);
}
}

footer{
position:absolute;
bottom:25px;
font-size:14px;
opacity:.5;
color:#666;
}

/* MOBILE VERSION */
@media (max-width:768px){

.logo{
font-size:42px;
}

h1{
font-size:30px;
animation:fadeIn 2s ease;
}

/* Disable full typewriter on phone */
.typing{
white-space:normal;
width:auto;
max-width:100%;
border-right:3px solid #575454;

animation:blink .8s infinite;
}

/* mobile-safe fade */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

p{
font-size:16px;
}

.btn{
padding:12px 28px;
}

.socials{
gap:20px;
}

.socials img{
width:36px;
height:36px;
}

footer{
font-size:12px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">Faaahhhh</div>

<h1>
<span class="typing">Portfolio Under Construction</span>
</h1>

<p>Building something worth visiting.</p>
